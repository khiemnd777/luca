name: ${APP_NAME}

services:
  frontend:
    build:
      context: ../fe
      dockerfile: Dockerfile.prod
    container_name: ${APP_NAME}_frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - target: 80
        published: "${FRONTEND_HOST_PORT:-8080}"
        host_ip: 127.0.0.1
        protocol: tcp
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME}_postgres
    environment:
      POSTGRES_DB: ${PG_DBNAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DBNAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ${PGDATA_DIR}:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME}_redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ${REDISDATA_DIR}:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ${APP_NAME}_api
    env_file:
      - ../.env.prod
      - .env.prod
    environment:
      APP_ENV: production
      DELIVERY_NOTE_BROWSER_BIN: /usr/bin/chromium
      GOCACHE: ${GOCACHE}
      OBSERVABLE: ${OBSERVABLE:-false}
      OBSERVABILITY_STACK_MANAGED_EXTERNALLY: ${OBSERVABILITY_STACK_MANAGED_EXTERNALLY:-false}
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      LOKI_BASE_URL: ${LOKI_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT}/ping >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 15s
    ports:
      - target: ${PORT}
        published: "${PORT}"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - api_storage:${STORAGE_ROOT}
      - api_gocache:${GOCACHE}
      - ./tmp/observability/logs:/app/tmp/observability/logs
    restart: unless-stopped

volumes:
  api_storage:
  api_gocache:

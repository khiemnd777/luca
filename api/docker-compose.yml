name: ${APP_NAME}

services:
  frontend:
    build:
      context: ../fe
      dockerfile: Dockerfile.dev
    container_name: ${APP_NAME}_frontend
    command: ["bun", "run", "dev"]
    env_file:
      - ../.env
      - ../fe/.env
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      VITE_API_PROXY_TARGET: http://api:${PORT:-7998}
      VITE_BASE_ADDRESS: localhost:${PORT:-7998}
      VITE_DEV_SERVER_HOST: 0.0.0.0
      VITE_DEV_SERVER_PORT: ${FRONTEND_CONTAINER_PORT:-5173}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:${FRONTEND_CONTAINER_PORT:-5173}"
    volumes:
      - ../fe:/app
      - fe_node_modules:/app/node_modules
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME}_postgres
    environment:
      PG_HOST: ${PG_HOST:-localhost}
      PG_PORT: 5432
      POSTGRES_DB: ${PG_DBNAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DBNAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${PG_PORT:-5431}:5432"
    volumes:
      - ${PGDATA_DIR}:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME}_redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ${REDISDATA_DIR}:/data
    ports:
      - "${REDIS_PORT:-6378}:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME}_api
    env_file:
      - ../.env
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      DELIVERY_NOTE_BROWSER_BIN: /usr/bin/chromium
      GOCACHE: ${GOCACHE}
      OBSERVABLE: ${OBSERVABLE:-false}
      OBSERVABILITY_STACK_MANAGED_EXTERNALLY: ${OBSERVABILITY_STACK_MANAGED_EXTERNALLY:-false}
      PG_HOST: ${PG_HOST:-localhost}
      PG_PORT: 5432
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      LOKI_BASE_URL: ${LOKI_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/app
      - api_gocache:${GOCACHE}
    working_dir: /app
    restart: unless-stopped

volumes:
  api_gocache:
  fe_node_modules:

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phiếu QR đơn hàng</title>
  <style>
    @page {
      size: {{.PaperSize}} portrait;
      margin: {{.PageMargin}};
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: #111;
      background: #fff;
      font-family: "Noto Sans", "DejaVu Sans", "Arial Unicode MS", Arial, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .sheet {
      min-height: calc(210mm - 16mm);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
    }

    .header {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 12mm;
    }

    .qr-wrap {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-box {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-box img {
      width: 150mm;
      height: 150mm;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <main class="sheet">
    <div class="header">{{ .HeaderLine }}</div>
    <div class="qr-wrap">
      <div class="qr-box">
        <img src="{{ .QRCodeImageURL }}" alt="qr-slip-a5" />
      </div>
    </div>
  </main>
</body>
</html>
